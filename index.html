<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宵灯谜会 - 猜灯谜赢红包</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 元宵渐变背景 */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* 星光动画 */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* 烟花动画 */
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ffdf00;
            border-radius: 50%;
            animation: firework 1.5s linear forwards;
        }

        @keyframes firework {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(30); opacity: 0; }
        }

        /* 主容器 */
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
            position: relative;
            z-index: 10;
        }

        /* 标题 */
        .title {
            text-align: center;
            font-size: 28px;
            color: #ff477e;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .bless {
            text-align: center;
            font-size: 16px;
            color: #ff6b9d;
            margin-bottom: 30px;
        }

        /* 信息栏 */
        .info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 16px;
            color: #333;
        }

        /* 题目区域 */
        .question {
            font-size: 20px;
            line-height: 1.6;
            text-align: center;
            margin: 30px 0;
            color: #333;
            min-height: 60px;
        }

        /* 选项按钮 */
        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .option-btn {
            width: 120px;
            height: 50px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-a {
            background: #72d9f7;
            color: white;
        }

        .btn-b {
            background: #ff92b5;
            color: white;
        }

        .option-btn:hover {
            transform: scale(1.05);
        }

        /* 结果提示 */
        .tip {
            text-align: center;
            font-size: 18px;
            height: 30px;
            margin-bottom: 10px;
        }

        .right {
            color: #00c851;
        }

        .wrong {
            color: #ff4444;
        }

        /* 结束页面 */
        .end {
            text-align: center;
            font-size: 22px;
            color: #ff477e;
            line-height: 1.8;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🏮 元宵节猜灯谜 🏮</div>
        <div class="bless">祝大家元宵快乐，团团圆圆，猜题赢红包～</div>
        
        <div class="info">
            <div>题目：<span id="q-num">1</span>/50</div>
            <div>当前余额：<span id="balance">0.0</span> 元</div>
        </div>
        <div class="info">
            <div>答对一题：+0.1元</div>
            <div>线下统一发放红包</div>
        </div>

        <div class="question" id="question-text">准备开始猜灯谜啦～</div>
        
        <div class="options">
            <button class="option-btn btn-a" id="opt-a">A</button>
            <button class="option-btn btn-b" id="opt-b">B</button>
        </div>
        
        <div class="tip" id="tip"></div>
        
        <div class="end" id="end-box">
            🎉 答题完成！<br>
            你一共获得：<span id="final-money">0.0</span> 元<br>
            线下找我领取红包哦～
        </div>
    </div>

    <script>
        // ✅ 50道元宵灯谜（A/B均匀分布：25个A，25个B）
        // ans=true=A，ans=false=B
        const questions = [
            // 字谜类（1-10：5A5B）
            {q:"一口咬掉牛尾巴（打一字）",a:"告",b:"午",ans:true},
            {q:"七十二小时（打一字）",a:"晶",b:"昌",ans:true},
            {q:"半真半假（打一字）",a:"值",b:"俱",ans:false},
            {q:"守门员（打一字）",a:"闪",b:"们",ans:true},
            {q:"有人偷车（打一字）",a:"输",b:"偷",ans:true},
            {q:"十五天（打一字）",a:"胖",b:"肥",ans:true},
            {q:"十月十日（打一字）",a:"朝",b:"萌",ans:false},
            {q:"夫人何处去（打一字）",a:"二",b:"人",ans:true},
            {q:"太阳西边下，月亮东边挂（打一字）",a:"明",b:"阴",ans:false},
            {q:"千里相逢（打一字）",a:"重",b:"从",ans:false},

            // 动物类（11-20：5A5B）
            {q:"耳朵长，尾巴短，红眼睛，白毛衫（打一动物）",a:"兔子",b:"老鼠",ans:true},
            {q:"身披花棉袄，唱歌呱呱叫，田里捉害虫（打一动物）",a:"青蛙",b:"蟋蟀",ans:true},
            {q:"尖嘴，细细腿，狡猾多疑拖大尾（打一动物）",a:"狐狸",b:"狼",ans:false},
            {q:"面孔像猫，起飞像鸟，天天上夜班（打一动物）",a:"猫头鹰",b:"蝙蝠",ans:true},
            {q:"小小飞贼，武器是针，抽别人血，养自己身（打一动物）",a:"蚊子",b:"苍蝇",ans:true},
            {q:"肥腿子，尖鼻子，穿裙子，背屋子（打一动物）",a:"蜗牛",b:"乌龟",ans:false},
            {q:"像熊比熊小，像猫比猫大，竹笋是食粮（打一动物）",a:"熊猫",b:"浣熊",ans:false},
            {q:"嘴像小铲子，脚像小扇子，走路左右摆（打一动物）",a:"鸭子",b:"鹅",ans:false},
            {q:"一身毛，尾巴翘，不会走，只会跳（打一动物）",a:"麻雀",b:"松鼠",ans:false},
            {q:"无脚也无手，身穿鸡皮皱，谁若碰着它，吓得连忙走（打一动物）",a:"蛇",b:"蚯蚓",ans:true},

            // 植物类（21-30：5A5B）
            {q:"麻屋子，红帐子，里面睡个白胖子（打一植物）",a:"花生",b:"核桃",ans:true},
            {q:"红口袋，绿口袋，有人害怕有人爱（打一植物）",a:"辣椒",b:"糖果",ans:false},
            {q:"一个小姑娘，生在水中央，身穿粉红衫（打一植物）",a:"荷花",b:"桃花",ans:true},
            {q:"弟兄七八个，围着柱子坐，只要一分开，衣服就扯破（打一植物）",a:"大蒜",b:"橘子",ans:false},
            {q:"冬天蟠龙卧，夏天枝叶开，龙须往上长（打一植物）",a:"葡萄",b:"丝瓜",ans:false},
            {q:"小小花儿爬篱笆，张开嘴巴不说话（打一植物）",a:"喇叭花",b:"玫瑰花",ans:true},
            {q:"生根不落地，有叶不开花，街上有人卖，园里不种它（打一植物）",a:"豆芽",b:"青菜",ans:false},
            {q:"海南宝岛是我家，不怕风吹和雨打（打一植物）",a:"椰子",b:"菠萝",ans:false},
            {q:"小时青，老来黄，金包银，有六方（打一植物）",a:"稻谷",b:"玉米",ans:true},
            {q:"身披黄袍狠妈妈，年纪一大手段辣（打一植物）",a:"生姜",b:"大蒜",ans:true},

            // 日常用品类（31-40：5A5B）
            {q:"独木造高楼，没瓦没砖头，人在水下走，水在人上流（打一物）",a:"雨伞",b:"帽子",ans:true},
            {q:"十个客人十间屋，冷了进去暖了出（打一物）",a:"手套",b:"鞋子",ans:false},
            {q:"小小两只船，没桨又没帆，白天带它走，夜晚停床边（打一物）",a:"鞋子",b:"袜子",ans:true},
            {q:"一匹马儿好，天生永不跑，天天踩它背，越踩越矮小（打一物）",a:"牙刷",b:"毛巾",ans:false},
            {q:"有面没有口，有脚没有手，虽有四只脚，自己不会走（打一物）",a:"桌子",b:"椅子",ans:false},
            {q:"颜色白如雪，身子硬如铁，一日洗三遍，夜晚柜中歇（打一物）",a:"碗",b:"盘子",ans:false},
            {q:"不怕细菌小，有它能看到，化验需要它（打一物）",a:"显微镜",b:"放大镜",ans:true},
            {q:"一间小木房，没门光有窗，只要窗户亮，又说又歌唱（打一物）",a:"收音机",b:"电视",ans:false},
            {q:"像马不是马，它比马儿大，身背两座山，脚踏万里沙（打一物）",a:"骆驼",b:"大象",ans:true},
            {q:"远看像道墙，近看一排房，走时快如飞，脚下雷声响（打一物）",a:"火车",b:"汽车",ans:false},

            // 元宵特色&脑筋急转弯（41-50：5A5B）
            {q:"元宵佳节吃的传统美食是？",a:"汤圆",b:"饺子",ans:true},
            {q:"什么门永远关不上？",a:"球门",b:"家门",ans:false},
            {q:"什么球离你最近？",a:"地球",b:"足球",ans:true},
            {q:"元宵灯谜又称？",a:"打灯谜",b:"猜谜语",ans:true},
            {q:"元宵节是农历几月几日？",a:"正月十五",b:"正月初一",ans:false},
            {q:"我到处乱跑，谁也捉不到，我跑过树林（打一自然现象）",a:"风",b:"云",ans:false},
            {q:"身上穿红袍，肚里真心焦，惹起心头火，跳得八丈高（打一物）",a:"鞭炮",b:"气球",ans:false},
            {q:"小小金坛子，装着金饺子，吃掉金饺子，吐出白珠子（打一水果）",a:"橘子",b:"柚子",ans:false},
            {q:"一个老头，不跑不走，请他睡觉，他就摇头（打一物）",a:"不倒翁",b:"玩具",ans:false},
            {q:"大姐长的真漂亮，身穿桔红花衣裳（打一昆虫）",a:"瓢虫",b:"蝴蝶",ans:true}
        ];

        // ✅ 核心：每个人打开，余额直接从 0 开始
        let currentBalance = 0;
        let currentQ = 0;
        const addMoney = 0.1;

        // 渲染题目
        function renderQ() {
            if(currentQ >= questions.length) {
                // 答题结束
                document.querySelector(".container").style.display = "none";
                document.getElementById("end-box").style.display = "block";
                document.getElementById("final-money").innerText = currentBalance.toFixed(1);
                return;
            }

            let q = questions[currentQ];
            document.getElementById("q-num").innerText = currentQ + 1;
            document.getElementById("question-text").innerText = q.q;
            document.getElementById("opt-a").innerText = "A: " + q.a;
            document.getElementById("opt-b").innerText = "B: " + q.b;
            document.getElementById("tip").innerText = "";
        }

        // 选择答案
        function choose(ans) {
            let correct = questions[currentQ].ans;
            if(ans === correct) {
                currentBalance += addMoney;
                document.getElementById("tip").innerText = "✅ 答对啦！+0.1元";
                document.getElementById("tip").className = "tip right";
            } else {
                document.getElementById("tip").innerText = "❌ 答错啦，继续加油～";
                document.getElementById("tip").className = "tip wrong";
            }

            document.getElementById("balance").innerText = currentBalance.toFixed(1);
            
            // 延迟切换下一题
            setTimeout(() => {
                currentQ++;
                renderQ();
            }, 800);
        }

        // 绑定按钮
        document.getElementById("opt-a").onclick = () => choose(true);
        document.getElementById("opt-b").onclick = () => choose(false);

        // 星光动画
        function createStars() {
            for(let i=0; i<100; i++) {
                let star = document.createElement("div");
                star.className = "star";
                star.style.left = Math.random() * 100 + "%";
                star.style.top = Math.random() * 100 + "%";
                star.style.animationDelay = Math.random() * 2 + "s";
                document.body.appendChild(star);
            }
        }

        // 烟花动画
        function createFirework() {
            let firework = document.createElement("div");
            firework.className = "firework";
            firework.style.left = Math.random() * 100 + "%";
            firework.style.top = Math.random() * 100 + "%";
            firework.style.background = `hsl(${Math.random()*360}, 100%, 60%)`;
            document.body.appendChild(firework);
            setTimeout(() => firework.remove(), 1500);
        }

        // 初始化
        createStars();
        setInterval(createFirework, 2000);
        renderQ();
    </script>
</body>
</html>
